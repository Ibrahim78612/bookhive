{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>BookHive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap');

        body {
            background: #0a0a0a;
            font-family: 'DM Mono', monospace;
            color: rgba(255, 255, 255, 0.85);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -1;
        }

        .navbar {
            background: rgba(10, 10, 10, 0.8) !important;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .navbar-brand {
            font-family: 'Playfair Display', serif;
            color: #f5f0e8 !important;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.5) !important;
            font-size: 12px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .nav-link:hover {
            color: rgba(220, 180, 100, 0.9) !important;
        }

        .btn-primary {
            background: rgba(220, 180, 100, 0.1);
            border: 1px solid rgba(220, 180, 100, 0.4);
            color: rgba(220, 180, 100, 0.9);
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .btn-primary:hover {
            background: rgba(220, 180, 100, 0.2);
            border-color: rgba(220, 180, 100, 0.7);
        }

        /* NAV SEARCH ONLY */
        .nav-search form {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .nav-search input,
        .nav-search select {
            background: rgba(20, 20, 20, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 6px 10px;
            font-size: 11px;
        }

        .nav-search select option {
            background: #0a0a0a;
            color: white;
        }

        .nav-search input:focus,
        .nav-search select:focus {
            outline: none;
            border-color: rgba(220, 180, 100, 0.5);
        }
    </style>

    <nav class="navbar navbar-expand-lg navbar-dark py-3">
        <div class="container">

            <a class="navbar-brand fw-semibold" href="/">BookHive</a>

            <div class="collapse navbar-collapse justify-content-center nav-search">
                <form method="get" action="{% url 'search' %}">
                    <input type="text" id="query" name="query" placeholder="Search">
                    <select name="type" id="type">
                      <option value="book_view">Books</option>
                      <option value="profile">Users</option>
                      <option value="list_detail">Lists</option>
                      <option value="club_detail">Clubs</option>
                    </select>
                    <input type="submit" value="Search" class="btn btn-primary">
                </form>
            </div>

            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav align-items-center gap-3">

                    <li><a class="nav-link" href="/books/">Books</a></li>
                    <li><a class="nav-link" href="/clubs/">Clubs</a></li>

                    {% if user.is_authenticated %}
                    <li><a class="nav-link" href="{% url 'friends' %}">Friends</a></li>
                    <li><a class="nav-link" href="{% url 'my_profile' %}">Profile</a></li>
                    <li><a class="nav-link" href="{% url 'logout' %}">Logout</a></li>
                    {% else %}
                    <li><a class="nav-link" href="/login/">Login</a></li>
                    <li><a class="btn btn-primary ms-2" href="/signup/">Sign Up</a></li>
                    {% endif %}

                </ul>
            </div>

        </div>
    </nav>

    {% block content_wrapper %}
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
    {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
