{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>BookHive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <style>
        body {
            min-height: 100%;
        }
    </style>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3">
        <div class="container">

            <a class="navbar-brand fw-semibold" href="/">BookHive</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-center">
                <form method="get" action="{% url 'search' %}">
                    <input type="text" id="query" name="query" placeholder="Search">
                    <select name="type" id="type">
                      <option value="book_view">Books</option>
                      <option value="profile">Users</option>
                    </select>
                    <input type="submit" value="search">
                </form>
            </div>

            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center gap-3">

                    <li class="nav-item">
                        <a class="nav-link" href="/books/">Books</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/clubs/">Clubs</a>
                    </li>

                    {% if user.is_authenticated %}
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'friends' %}">Friends</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'my_profile' %}">Profile</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'logout' %}">Logout</a>
                    </li>
                    {% else %}
                    <li class="nav-item">
                        <a class="nav-link" href="/login/">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-primary ms-2" href="/signup/">Sign Up</a>
                    </li>
                    {% endif %}

                </ul>
            </div>

        </div>
    </nav>

    {% block content_wrapper %}
    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>
    {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
