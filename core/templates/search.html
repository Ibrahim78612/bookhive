{% extends "base.html" %}

{% block content_wrapper %}
{% block content %}
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap');
    h3 {
      color: white;
    }
    h4 {
      color: white;
    }
    p {
      color: white;
    }
    a {
      color: rgba(220,180,100,1.0);
    }
    .shelf {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .book {
      display: flex;
      flex-direction: row;
      width: 70%;
      backdrop-filter: blur(5px);
      padding: 5px;
      margin: 5px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .book-metadata {
      margin-left: 15px;
    }
  </style>

  <div class="shelf">
    {% for book in docs %}
      <div class="book">
        <img src={{ book.cover }}>
        <div class="book-metadata">
          <a href="/books/{{ book.workid }}">{{ book.title }}</a>
          <p>
            {% for author in book.authors %}
              {{author}} 
            {% endfor %}
          </p>
        <p>{{ book.first_publish_year }}</p>
        </div>
      </div>
    {% endfor %}
  </div>

{% endblock %}
{% endblock %}
