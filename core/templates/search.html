{% extends "base.html" %}

{% block content_wrapper %}
{% block content %}
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap');
    h3 {
      color: white;
    }
    h4 {
      color: white;
    }
    p {
      color: white;
    }
    a {
      color: rgba(220,180,100,1.0);
      font-family: 'Playfair Display', serif;
    }
    body {
      background-color: #0a0a0a;
    }
    .shelf {
      display: flex;
      flex-direction: column;
      align-items: center;
      background-image:
        linear-gradient(rgba(255,255,255,0.03), 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03), 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .item {
      display: flex;
      flex-direction: row;
      width: 70%;
      min-height: 120px;
      backdrop-filter: blur(2px);
      padding: 5px;
      margin: 5px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .metadata {
      margin-left: 15px;
    }
  </style>

  <div class="shelf">
    {% for item in docs %}
      <div class="item">
        <img src={{ item.image }}>
        <div class="metadata">
          <a href="/books/{{ item.id }}">
            {{ item.title }}
          </a>
            {% for metadata in item.meta %}
              <p>{{ metadata }}</p>
            {% endfor %}
        </div>
      </div>
    {% endfor %}
  </div>

{% endblock %}
{% endblock %}
