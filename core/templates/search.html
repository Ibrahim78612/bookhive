{% extends "base.html" %}
{% load static %}

{% block content_wrapper %}
{% block content %}
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap');

  body {
    background-color: #0a0a0a;
  }

  h3,
  h4 {
    font-family: 'Playfair Display', serif;
    color: #f5f0e8;
  }

  p {
    font-family: 'DM Mono', monospace;
    color: rgba(255, 255, 255, 0.4);
    font-size: 12px;
  }

  a {
    color: rgba(220, 180, 100, 0.9);
    font-family: 'Playfair Display', serif;
    text-decoration: none;
  }

  a:hover {
    color: rgba(220, 180, 100, 1);
  }

  .shelf {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 40px 0;
  }

  .item {
    display: flex;
    flex-direction: row;
    width: 70%;
    min-height: 120px;
    padding: 16px;
    backdrop-filter: blur(10px);
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.08);
    transition: 0.25s;
  }

  .item:hover {
    border-color: rgba(220, 180, 100, 0.4);
    background: rgba(220, 180, 100, 0.05);
  }

  .imgdiv {
    width: 90px;
    height: 120px;
    flex-shrink: 0;
  }

  .imgdiv img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .metadata {
    margin-left: 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .metadata a {
    font-size: 18px;
    margin-bottom: 6px;
  }

  #sort-by {
    float: left;
    background-color: #000000;
    color: #ffffff;
  }

  .shelf::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: -1;
  }
</style>
<script defer src="{% static 'search/js/dropdown.js' %}"></script>

<div class="shelf">
  {% if filters %}
  <select name="sort" id="sort-by">
    <option value="none" selected disabled hidden>filter by...</option>
    {% for filter in filters %}
    <option value="{{ filter }}">{{ filter }} (asc)</option>
    <option value="{{ filter }}_desc">{{ filter }} (desc)</option>
    {% endfor %}
  {% endif %}
  </select>
  {% for item in docs %}
  <div class="item">
    {% if item.image %}
    <div class="imgdiv"><img src={{ item.image }}></div>
    {% else %}
    <div class="imgdiv"><img src="{% static to_page %}"></div>
    {% endif %}
    <div class="metadata">
      <a href="{% url to_page item.id %}">
        {{ item.title }}
      </a>
      {% for metadata in item.meta %}
      <p>{{ metadata }}</p>
      {% endfor %}
    </div>
  </div>
  {% endfor %}
</div>

{% endblock %}
{% endblock %}
