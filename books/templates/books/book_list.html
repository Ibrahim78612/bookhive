{% extends "base.html" %}

{% block content %}

<style>
    .book-page {
        position: relative;
        min-height: 100vh;
        padding: 80px 0;
        background: #0a0a0a;
    }

    .bg-grid {
        position: absolute;
        inset: 0;
        background-image:
            linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 60px 60px;
    }

    .glow-orb {
        position: absolute;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(220, 180, 100, 0.12) 0%, transparent 70%);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
    }

    .wrapper {
        position: relative;
        z-index: 1;
        max-width: 1200px;
        margin: auto;
    }

    .category-title {
        font-family: 'Playfair Display', serif;
        color: #f5f0e8;
        font-size: 28px;
        margin-bottom: 25px;
    }

    .book-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(20px);
        padding: 15px;
        height: 100%;
        transition: 0.25s;
    }

    .book-card:hover {
        transform: translateY(-6px);
        border-color: rgba(220, 180, 100, 0.5);
    }

    .book-cover {
        width: 100%;
        height: 260px;
        object-fit: cover;
        margin-bottom: 12px;
    }

    .book-title {
        color: #f5f0e8;
        font-size: 16px;
        margin-bottom: 6px;
    }

    .book-author {
        color: rgba(255, 255, 255, 0.6);
        font-size: 13px;
        margin-bottom: 10px;
    }

    .view-link {
        font-size: 12px;
        color: #dcb464;
        text-decoration: none;
    }

    .view-link:hover {
        color: #fff;
    }
</style>

<div class="book-page">
    <div class="bg-grid"></div>
    <div class="glow-orb"></div>

    <div class="wrapper">

        {% for category, books in categories.items %}
        <div style="margin-bottom:60px;">

            <div style="text-align:center; margin-bottom:20px;">
                <span style="font-family:'DM Mono'; font-size:10px; letter-spacing:.4em; color:#dcb464;">
                    CATEGORY
                </span>
                <div class="category-title">{{ category }}</div>
            </div>

            <div class="row">
                {% for book in books %}
                <div class="col-md-3 mb-4">
                    <div class="book-card">

                        {% if book.cover %}
                        <img src="{{ book.cover }}" class="book-cover">
                        {% endif %}

                        <div class="book-title">{{ book.title }}</div>
                        <div class="book-author">{{ book.author }}</div>

                        <a href="{% url 'book_view' book.workid %}" class="view-link">
                            View →
                        </a>

                    </div>
                </div>
                {% endfor %}
            </div>

        </div>
        {% endfor %}

    </div>
</div>

{% endblock %}
