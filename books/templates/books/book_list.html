{% extends "base.html" %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'books/css/book_list.css' %}">

<div class="book-page">
    <div class="bg-grid"></div>
    <div class="glow-orb"></div>

    <div class="wrapper">

        {% for category, books in categories.items %}
        <div style="margin-bottom:60px;">

            <div style="text-align:center; margin-bottom:20px;">
                <span style="font-family:'DM Mono'; font-size:10px; letter-spacing:.4em; color:#dcb464;">
                    CATEGORY
                </span>
                <div class="category-title">{{ category }}</div>
            </div>

            <div class="row">
                {% for book in books %}
                <div class="col-md-3 mb-4">
                    <div class="book-card">

                        {% if book.cover %}
                        <img src="{{ book.cover }}" class="book-cover">
                        {% endif %}

                        <div class="book-title">{{ book.title }}</div>
                        <div class="book-author">{{ book.author }}</div>

                        <a href="{% url 'book_view' book.workid %}" class="view-link">
                            View →
                        </a>

                    </div>
                </div>
                {% endfor %}
            </div>

        </div>
        {% endfor %}

    </div>
</div>

{% endblock %}
