{% extends "base.html" %}
{% load static %}

{% block content_wrapper %}
{% block content %}

<link rel="stylesheet" href="{% static 'clubs/css/club_form.css' %}">
<div class="auth-page">
    <div class="bg-grid"></div>

    <div class="form-wrapper">
        <div class="form-card">

            <div class="form-title">{{ action }} Club</div>

            <form method="POST">
                {% csrf_token %}

                <div class="form-group">
                    <label>Name</label>
                    {{ form.name }}
                </div>

                <div class="form-group">
                    <label>Description</label>
                    {{ form.description }}
                </div>

                <div class="button-group">
                    <button type="submit" class="submit-btn">{{ action }} Club</button>

                    {% if action == 'Edit' %}
                    <a href="{% url 'club_detail' club.id %}" class="cancel-btn">Cancel</a>
                    {% else %}
                    <a href="{% url 'club_list' %}" class="cancel-btn">Cancel</a>
                    {% endif %}
                </div>

            </form>

        </div>
    </div>
</div>

{% endblock %}
{% endblock %}
