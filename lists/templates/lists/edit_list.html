{% extends "base.html" %}
{% load static %}
{% block content_wrapper %}
{% block content %}
<link rel="stylesheet" href="{% static 'lists/css/list_forms.css' %}">
<div class="list-form-page">
  <div class="list-form-box">
    <div class="list-form-eyebrow">Edit List</div>
    <h1 class="list-form-title">{{ list.name }}</h1>
    <form method="post" class="list-form">
      {% csrf_token %}
      <div class="list-form-field">
        <label class="list-form-label" for="name">List Name</label>
        <input type="text" id="name" name="name" class="list-form-input" value="{{ list.name }}" required
          autocomplete="off">
      </div>
      <div class="list-form-field">
        <label class="list-form-label" for="description">Description <span class="optional">(optional)</span></label>
        <textarea id="description" name="description" class="list-form-textarea">{{ list.description }}</textarea>
      </div>
      <div class="list-form-actions">
        <button type="submit" class="btn-primary">Save Changes</button>
        <a href="{% url 'list_detail' list.id %}" class="btn-cancel">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
{% endblock %}
