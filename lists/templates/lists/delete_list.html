{% extends "base.html" %}
{% load static %}
{% block content_wrapper %}
{% block content %}
<link rel="stylesheet" href="{% static 'lists/css/list_forms.css' %}">
<div class="list-form-page">
  <div class="list-form-box">
    <div class="list-form-eyebrow">Danger Zone</div>
    <h1 class="list-form-title">Delete List</h1>
    <p class="list-form-warning">Are you sure you want to delete <strong>{{ list.name }}</strong>? This cannot be
      undone.</p>
    <form method="post" class="list-form">
      {% csrf_token %}
      <div class="list-form-actions">
        <button type="submit" class="btn-danger">Yes, Delete</button>
        <a href="{% url 'list_detail' list.id %}" class="btn-cancel">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
{% endblock %}
